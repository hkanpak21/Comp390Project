<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 720" font-family="'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif">
  <!-- Sanzo Wada palette: cream #F0E8D0, indigo #1B3A55, persimmon #C8723A -->
  <rect width="880" height="720" fill="#F0E8D0"/>

  <!-- Title block -->
  <text x="440" y="48" text-anchor="middle" font-size="20" font-weight="600" fill="#1B3A55">
    One DKS Rotation, End to End
  </text>
  <text x="440" y="70" text-anchor="middle" font-size="12" font-weight="400" fill="#1B3A55" opacity="0.75">
    4 GPUs · β = 36 digits · ~9 owned per GPU · N = 65,536
  </text>

  <!-- GPU column headers -->
  <g font-size="12" font-weight="600" fill="#1B3A55">
    <text x="135" y="115" text-anchor="middle">GPU 0  ·  digits 0–8</text>
    <text x="325" y="115" text-anchor="middle">GPU 1  ·  digits 9–17</text>
    <text x="515" y="115" text-anchor="middle">GPU 2  ·  digits 18–26</text>
    <text x="705" y="115" text-anchor="middle">GPU 3  ·  digits 27–35</text>
  </g>

  <!-- Header underline -->
  <line x1="60" y1="125" x2="780" y2="125" stroke="#1B3A55" stroke-width="1"/>

  <!-- ───────── Step 1: Galois (replicated, thin band) ───────── -->
  <g>
    <rect x="60" y="145" width="720" height="30" fill="none" stroke="#1B3A55" stroke-width="1"/>
    <text x="420" y="165" text-anchor="middle" font-size="12" fill="#1B3A55">
      Step 1.  Galois automorphism  X → X^(5^k)   ·   replicated   ·   ~µs
    </text>
  </g>

  <!-- ───────── Step 2: Mod-up ───────── -->
  <g>
    <text x="60" y="200" font-size="12" font-weight="600" fill="#1B3A55">
      Step 2.  Mod-up  Q → PQ
    </text>
    <text x="780" y="200" text-anchor="end" font-size="11" fill="#1B3A55" opacity="0.7">
      ~850 ms  ·  dominant cost
    </text>

    <!-- Per-GPU mod-up: tall box (full 36 digits) with persimmon top stripe (the 9 owned) -->
    <g stroke="#1B3A55" stroke-width="1" fill="none">
      <rect x="60"  y="215" width="150" height="120" fill="#1B3A55" fill-opacity="0.10"/>
      <rect x="250" y="215" width="150" height="120" fill="#1B3A55" fill-opacity="0.10"/>
      <rect x="440" y="215" width="150" height="120" fill="#1B3A55" fill-opacity="0.10"/>
      <rect x="630" y="215" width="150" height="120" fill="#1B3A55" fill-opacity="0.10"/>
    </g>

    <!-- The 9 owned digits — persimmon stripe at the top of each GPU's mod-up box -->
    <g fill="#C8723A" stroke="#C8723A" stroke-width="1">
      <rect x="60"  y="215" width="150" height="30"/>
      <rect x="250" y="215" width="150" height="30"/>
      <rect x="440" y="215" width="150" height="30"/>
      <rect x="630" y="215" width="150" height="30"/>
    </g>

    <!-- Labels -->
    <g font-size="10" fill="#F0E8D0" font-weight="600" text-anchor="middle">
      <text x="135" y="234">9 owned digits  ·  ~195 MB</text>
      <text x="325" y="234">9 owned digits  ·  ~195 MB</text>
      <text x="515" y="234">9 owned digits  ·  ~195 MB</text>
      <text x="705" y="234">9 owned digits  ·  ~195 MB</text>
    </g>
    <g font-size="10" fill="#1B3A55" text-anchor="middle">
      <text x="135" y="290">27 unowned</text>
      <text x="135" y="306">computed,</text>
      <text x="135" y="322">discarded</text>
      <text x="325" y="290">27 unowned</text>
      <text x="325" y="306">computed,</text>
      <text x="325" y="322">discarded</text>
      <text x="515" y="290">27 unowned</text>
      <text x="515" y="306">computed,</text>
      <text x="515" y="322">discarded</text>
      <text x="705" y="290">27 unowned</text>
      <text x="705" y="306">computed,</text>
      <text x="705" y="322">discarded</text>
    </g>
  </g>

  <!-- ───────── Step 3: Partial inner product ───────── -->
  <g>
    <text x="60" y="370" font-size="12" font-weight="600" fill="#1B3A55">
      Step 3.  Partial inner product  Σ over owned digits
    </text>
    <text x="780" y="370" text-anchor="end" font-size="11" fill="#1B3A55" opacity="0.7">
      ~142 ms total  ·  parallelised
    </text>

    <g stroke="#1B3A55" stroke-width="1" fill="#1B3A55" fill-opacity="0.18">
      <rect x="60"  y="385" width="150" height="50"/>
      <rect x="250" y="385" width="150" height="50"/>
      <rect x="440" y="385" width="150" height="50"/>
      <rect x="630" y="385" width="150" height="50"/>
    </g>

    <g font-size="11" fill="#1B3A55" text-anchor="middle">
      <text x="135" y="408">(α₀, β₀)</text>
      <text x="135" y="424" font-size="10" opacity="0.75">i = 0..8</text>
      <text x="325" y="408">(α₁, β₁)</text>
      <text x="325" y="424" font-size="10" opacity="0.75">i = 9..17</text>
      <text x="515" y="408">(α₂, β₂)</text>
      <text x="515" y="424" font-size="10" opacity="0.75">i = 18..26</text>
      <text x="705" y="408">(α₃, β₃)</text>
      <text x="705" y="424" font-size="10" opacity="0.75">i = 27..35</text>
    </g>
  </g>

  <!-- Arrows from each partial down into AllReduce -->
  <g stroke="#1B3A55" stroke-width="1.2" fill="none">
    <line x1="135" y1="445" x2="135" y2="465"/>
    <line x1="325" y1="445" x2="325" y2="465"/>
    <line x1="515" y1="445" x2="515" y2="465"/>
    <line x1="705" y1="445" x2="705" y2="465"/>
  </g>

  <!-- ───────── Step 4: AllReduce ───────── -->
  <g>
    <rect x="60" y="465" width="720" height="55" fill="#1B3A55"/>
    <text x="420" y="488" text-anchor="middle" font-size="12" font-weight="600" fill="#F0E8D0">
      Step 4.  ncclAllReduce(SUM)   ·   ~32 MB per GPU   ·   1.77 ms / call
    </text>
    <text x="420" y="506" text-anchor="middle" font-size="10" fill="#F0E8D0" opacity="0.85">
      after the call, every GPU has identical (α, β) = Σᵢ (αᵢ, βᵢ) for i = 0..35
    </text>
  </g>

  <!-- ───────── Step 5: Mod-down (replicated) ───────── -->
  <g>
    <text x="60" y="555" font-size="12" font-weight="600" fill="#1B3A55">
      Step 5.  Mod-down  PQ → Q
    </text>
    <text x="780" y="555" text-anchor="end" font-size="11" fill="#1B3A55" opacity="0.7">
      replicated  ·  cheap
    </text>

    <g stroke="#1B3A55" stroke-width="1" fill="#1B3A55" fill-opacity="0.10">
      <rect x="60"  y="568" width="150" height="34"/>
      <rect x="250" y="568" width="150" height="34"/>
      <rect x="440" y="568" width="150" height="34"/>
      <rect x="630" y="568" width="150" height="34"/>
    </g>
    <g font-size="11" fill="#1B3A55" text-anchor="middle">
      <text x="135" y="589">÷ P</text>
      <text x="325" y="589">÷ P</text>
      <text x="515" y="589">÷ P</text>
      <text x="705" y="589">÷ P</text>
    </g>
  </g>

  <!-- ───────── Step 6: Add back ───────── -->
  <g>
    <rect x="60" y="625" width="720" height="32" fill="none" stroke="#1B3A55" stroke-width="1"/>
    <text x="420" y="645" text-anchor="middle" font-size="12" fill="#1B3A55">
      Step 6.  c₀ ← c₀ + α′  ·  c₁ ← c₁ + β′  ·  rotation complete on every GPU
    </text>
  </g>

  <!-- Legend -->
  <g transform="translate(60 685)" font-size="10" fill="#1B3A55">
    <rect x="0" y="-1" width="14" height="12" fill="#C8723A"/>
    <text x="20" y="9">owned digits (parallel work)</text>
    <rect x="220" y="-1" width="14" height="12" fill="#1B3A55" fill-opacity="0.10" stroke="#1B3A55"/>
    <text x="240" y="9">replicated / wasted work</text>
    <rect x="430" y="-1" width="14" height="12" fill="#1B3A55"/>
    <text x="450" y="9">collective synchronization (NCCL)</text>
  </g>
</svg>
